# ============================================
# Notion → 多平台发布 配置
# 支持: 微信公众号, 知乎
# ============================================
# 敏感信息 (api_key, cookie 等) 请通过环境变量设置，
# 或直接写在这里（不要提交到 git！）
# ============================================

notion:
  api_key: "your-notion-api-key-here"
  # 数据库 ID（auto 模式使用）
  database_id: ""

# 微信公众号配置
wechat:
  app_id: "your-wechat-app-id"
  app_secret: "your-wechat-app-secret"

# 知乎配置
zhihu:
  # 知乎 Cookie（登录知乎后从浏览器中提取）
  # 方法: F12 → Application → Cookies → 复制所有 cookie
  cookie_string: "your-zhihu-cookie-here"

# 多平台发布开关 (true = 启用, false = 禁用)
platforms:
  wechat: true
  zhihu: true

# Notion 数据库字段映射（按你的实际数据库列名修改）
field_mapping:
  title: "Title"            # 标题字段名
  status: "Status"          # 发布状态字段名
  pending: "待发布"          # "待发布" 状态值
  published: "已发布"        # "已发布" 状态值
  summary: "Summary"        # 摘要字段名 (可选)
  slug: "Slug"              # 自定义 URL 标识 (可选)
  tags: "Tags"              # 标签字段名 (可选)

# 发布选项
publish:
  # 自动发布模式: true=直接发布, false=仅创建草稿
  auto_publish: false
  # 是否在发布后更新 Notion 状态为"已发布"
  update_notion_status: true
  # 默认封面图 URL（文章无封面时使用）
  default_cover_url: ""
  # 知乎文章默认保存为草稿(true)还是直接发布(false)
  zhihu_as_draft: true
